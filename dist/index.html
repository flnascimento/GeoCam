<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GeoCam Engenharia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/GeoCam/assets/index-ByUMEZZ2.js"></script>
  <link rel="stylesheet" crossorigin href="/GeoCam/assets/index-DCKOuV5A.css">
<link rel="manifest" href="/GeoCam/manifest.webmanifest"></head>
<body>
  <div class="flip-container" id="flip-container">
    <div class="flipper">
      
      <div class="front">
        <div class="camera-wrapper">
          <div class="camera-container">
            <video id="camera-preview" autoplay playsinline></video>
            <!-- Canvas escondido usado para gerar a foto final -->
            <canvas id="photo-canvas" width="1080" height="1080"></canvas>
            
            <!-- Elementos visuais por cima do vídeo -->
            <div class="overlay">
              <div class="grid-thirds">
                <div class="grid-line-h" style="top: 33.33%;"></div>
                <div class="grid-line-h" style="top: 66.66%;"></div>
                <div class="grid-line-v" style="left: 33.33%;"></div>
                <div class="grid-line-v" style="left: 66.66%;"></div>
              </div>
              
              <div id="device-level-container" style="position: absolute; top: 5px; right: 15px; display: flex; align-items: center; gap: 8px; color: white; text-shadow: 1px 1px 2px #000; font-family: monospace; font-weight: bold; pointer-events: none; z-index: 2;">
                <div style="width: 24px; height: 24px; position: relative;">
                  <!-- Fixed Crosshair -->
                  <svg width="24" height="24" viewBox="0 0 24 24" style="position: absolute; top: 0; left: 0; opacity: 0.5;">
                    <circle cx="12" cy="12" r="9" fill="none" stroke="white" stroke-width="1"/>
                    <line x1="3" y1="12" x2="21" y2="12" stroke="white" stroke-width="1"/>
                    <line x1="12" y1="3" x2="12" y2="21" stroke="white" stroke-width="1"/>
                  </svg>
                  <!-- Moving Level Indicator -->
                  <svg id="level-icon" width="24" height="24" viewBox="0 0 24 24" style="position: absolute; top: 0; left: 0; transform-origin: center;">
                    <line x1="0" y1="12" x2="24" y2="12" stroke="#0f0" stroke-width="2"/>
                  </svg>
                </div>
                <span id="device-level-text" style="font-size: 12px; width: 40px; text-align: left; display: inline-block;">0.0°</span>
              </div>

              <img id="overlay-logo" src="/GeoCam/logomarca/Logo.png" alt="Logo" crossorigin="anonymous">
              
              <!-- Metadata no canto inferior direito -->
              <div class="metadata-preview">
                <div id="preview-obra">-</div>
                <div id="preview-date">Data Hora</div>
                <div id="preview-utm">UTM X Y</div>
                <div id="preview-label"></div>
                <div id="preview-empresa"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="bottom-bar">
          <button id="btn-capture" class="shutter-btn"></button>
        </div>
        <button id="btn-settings" class="icon-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>

      <!-- Lado das Configurações -->
      <div class="back">
        <div class="settings-container">
          <div class="settings-header">
            <h2>Configurações</h2>
            <button id="btn-back" class="icon-btn" style="background:none; border:none; color:white; padding: 10px; cursor: pointer;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          
          <div class="settings-content">
            
            <!-- Cadastro de Obras -->
            <div class="settings-section">
              <h3>Obras</h3>
              <div class="input-group">
                <input type="text" id="obra-name" placeholder="Nome da Obra">
                <input type="number" id="obra-radius" placeholder="Raio (m)">
                
                <label style="margin-top: 10px; font-size: 13px; color: #aaa;">Centro da Obra (UTM)</label>
                <div style="display: flex; gap: 8px;">
                  <input type="number" id="obra-utm-e" placeholder="Ex: 253946" style="flex: 1;">
                  <input type="number" id="obra-utm-n" placeholder="Ex: 9343209" style="flex: 1;">
                </div>
                <div style="display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px;">
                  <input type="text" id="obra-zone" placeholder="Zona" style="flex: 1; margin: 0;">
                  <button id="btn-capture-gps" class="btn-secondary" style="flex: 1; margin: 0; padding: 10px; font-size: 14px;">Capturar GPS</button>
                </div>

                <button id="btn-add-obra" class="btn-primary">Salvar Obra</button>
                <button id="btn-cancel-edit" class="btn-secondary" style="display: none; margin-top: 10px;">Cancelar Edição</button>
              </div>
              <details style="margin-top: 15px;">
                <summary style="cursor: pointer; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px;">Obras Cadastradas</summary>
                <ul id="obras-list" class="obras-list">
                  <!-- Obras inseridas via JS -->
                </ul>
              </details>
            </div>

            <!-- Logo -->
            <div class="settings-section">
              <h3>Logo e Marca d'Água</h3>
              <div class="input-group">
                <label>Tamanho da Logo (<span id="logo-size-val">30</span>%)</label>
                <input type="range" id="logo-size" min="10" max="100" value="30">
              </div>
              <div class="input-group">
                <label>Opacidade da Logo (<span id="logo-opacity-val">70</span>%)</label>
                <input type="range" id="logo-opacity" min="0" max="100" value="70">
              </div>
              <div class="input-group">
                <input type="text" id="custom-label" placeholder="Texto Opcional (Label)">
              </div>
            </div>

            <!-- Atualização e Instalação -->
            <div class="settings-section">
              <h3>Sistema</h3>
              <div style="display: flex; gap: 8px;">
                <button id="btn-update" class="btn-secondary" style="flex: 1;">Buscar Atualização</button>
                <button id="btn-install" class="btn-primary" style="flex: 1; display: none;">Instalar App</button>
              </div>
            </div>

          </div>
        </div>
      </div>
      
    </div>
  </div>
  
</body>
</html>
